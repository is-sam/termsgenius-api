services:
  php:
    image: php:8.1-fpm
    container_name: termsgenius_php
    restart: unless-stopped
    working_dir: /var/www/symfony
    build: .
    volumes:
      - .:/var/www/symfony
      - ./.docker/php.ini:/usr/local/etc/php/php.ini
    networks:
      - api

  nginx:
    image: nginx:alpine
    container_name: termsgenius_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/symfony
      - ./.docker/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - api

  db:
    image: mariadb:11.2
    container_name: termsgenius_db
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - api

volumes:
  db-data:

networks:
  api:
    driver: bridge
